{%extends 'layout.html'%}

{%block title%}
    login
{%endblock%}

{%block content%}
    <h1>Login</h1>
    <form action="{%url 'users:login'%}" method="POST">
        {%csrf_token%}
        {{form}}
        {% if request.GET.next %}
            <input type="hidden" name="next" value="{{request.GET.next}}">
        {%endif%}
        <button type="submit" class="uk-button uk-button-default">Enviar</button>
    </form>
{%endblock%}

{%extends 'layout.html'%}

{%block title%}
    Postagens
{%endblock%}

{%block content%}
    <h1>Postagens mais recentes</h1>
    <table class="uk-table uk-table-striped">
        <thead>
            <tr>
                <th>titulo</th>
                <th>data</th>
                <th>texto</th>
            </tr>
        </thead>
        {%for post in posts%}
            <tr>
                <td>
                    <a href="{% url 'posts:page' slug=post.slug %}">
                        {{post.titulo}}
                    </a>
                </td>
                <td>{{post.date}}</td>
                <td>{{post.texto}}</td>
            </tr>
        {%endfor%}
    </table>

{%endblock%}
